name: Update Visa Bulletin
on:
  schedule:
    - cron: "18 13 15 * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update EB-3 ROW data
        run: node scripts/updateVisa.js
      - name: Commit data updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update visa bulletin data"
          file_pattern: latest.json history.json
